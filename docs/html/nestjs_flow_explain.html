<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NestJS — Bản Đồ Nhà Hàng 5 Sao</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #1F1F1F;
    --bg-header: #181818;
    --bg-card: #252526;
    --bg-hover: #2A2D2E;
    --bg-active: #37373D;
    
    --accent: #007ACC;
    --accent-dim: #004a7c;
    
    --text-main: #CCCCCC;
    --text-bright: #FFFFFF;
    --text-muted: #858585;
    
    --border: #333333;
    
    /* VS Code Syntax Colors */
    --syntax-blue: #569CD6;
    --syntax-cyan: #4EC9B0;
    --syntax-orange: #CE9178;
    --syntax-yellow: #DCDCAA;
    --syntax-pink: #C586C0;
    --syntax-green: #B5CEA8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-main);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    padding: 40px 20px 30px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 80% at 50% -20%, rgba(0,122,204,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 16px;
    color: var(--text-bright);
  }
  header h1 span { color: var(--accent); }
  header p {
    color: var(--text-muted);
    max-width: 600px;
    margin: 0 auto;
    font-size: 14px;
  }

  /* ── EXPLORER LAYOUT ── */
  main { max-width: 1280px; margin: 32px auto; padding: 0 24px; }
  
  .explorer {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    background: var(--bg-header);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 0;
    flex-shrink: 0;
    position: sticky;
    top: 24px;
  }
  .sidebar-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 16px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .folder-tab {
    padding: 10px 16px 10px 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    border-left: 3px solid transparent;
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }
  .folder-tab:hover { background: var(--bg-hover); color: var(--text-main); }
  .folder-tab.active { 
    background: var(--bg-active); 
    color: var(--text-bright); 
    border-left-color: var(--accent); 
  }
  .folder-icon { font-size: 16px; }

  /* CONTENT AREA */
  .content {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px;
    min-height: 600px;
  }
  
  .content-header { margin-bottom: 32px; border-bottom: 1px solid var(--border); padding-bottom: 24px; }
  .content-title { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--text-bright); margin-bottom: 8px; }
  .content-subtitle { color: var(--syntax-cyan); font-family: 'DM Mono', monospace; font-size: 13px; margin-bottom: 16px; }
  .content-desc { color: var(--text-main); line-height: 1.7; }

  /* LIFECYCLE DIAGRAM (CSS-based) */
  .lifecycle-diagram {
    background: var(--bg-main);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px;
    margin-bottom: 32px;
    overflow-x: auto;
  }
  .lc-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 24px;
    text-align: center;
  }
  
  .lc-flow {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  
  .lc-node {
    background: var(--bg-header);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    min-width: 160px;
    max-width: 200px;
    text-align: center;
    position: relative;
  }
  .lc-node.highlight { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,122,204,0.15); }
  .lc-node-title { font-weight: 600; font-size: 13px; color: var(--text-bright); margin-bottom: 6px; }
  .lc-node-code { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--syntax-pink); margin-bottom: 6px; }
  .lc-node-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  
  .lc-arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--accent);
  }
  .lc-arrow-line { width: 30px; height: 2px; background: var(--accent); }
  .lc-arrow-head { width: 0; height: 0; border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 6px solid var(--accent); margin-left: -2px; }
  
  .lc-arrow-wrapper { display: flex; align-items: center; }

  /* DETAILS GRID */
  .details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  @media (max-width: 900px) {
    .explorer { flex-direction: column; }
    .sidebar { width: 100%; position: static; }
    .details-grid { grid-template-columns: 1fr; }
  }

  .detail-box {
    background: var(--bg-header);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }
  .detail-box h4 {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--syntax-yellow);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .detail-box p { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 12px; }
  .detail-box p:last-child { margin-bottom: 0; }
  .detail-box b { color: var(--text-main); }
  
  .code-block {
    background: var(--bg-main);
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--syntax-blue);
    line-height: 1.5;
    overflow-x: auto;
  }
  .code-block .fn { color: var(--syntax-yellow); }
  .code-block .str { color: var(--syntax-orange); }
  .code-block .kw { color: var(--syntax-pink); }
  .code-block .typ { color: var(--syntax-cyan); }
  .code-block .cmt { color: #6A9955; }
</style>
</head>
<body>

<header>
  <p class="header-eyebrow">NestJS Request Lifecycle</p>
  <h1>Sơ Đồ <span>Folder</span> Nhà Hàng</h1>
  <p>Giải phẫu luồng đi của một Request đi sâu vào từng ngóc ngách của thư mục `src/`, kết hợp mô hình Nhà hàng 5 sao và cấu trúc VS Code.</p>
</header>

<main>
  <div class="explorer">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-title">Explorer: src/</div>
      <div id="tabsContainer">
        <!-- Tabs injected by JS -->
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content" id="contentArea">
      <!-- Content injected by JS -->
    </div>
  </div>
</main>

function renderSidebar() {
  const container = document.getElementById('tabsContainer');
  let html = '';
  foldersData.forEach((f, idx) => {
    const active = idx === 0 ? 'active' : '';
    html += `
      <div class="folder-tab ${active}" onclick="selectFolder('${f.id}', this)">
        <span class="folder-icon">${f.icon}</span> ${f.tabName}
      </div>
    `;
  });
  container.innerHTML = html;
}

function selectFolder(id, el) {
  // Update sidebar UI
  document.querySelectorAll('.folder-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  
  // Update content UI
  const data = foldersData.find(f => f.id === id);
  if (!data) return;
  
  let nodesHtml = '';
  data.nodes.forEach((n, idx) => {
    const hlClass = n.highlight ? 'highlight' : '';
    nodesHtml += `
      <div class="lc-arrow-wrapper">
        <div class="lc-node ${hlClass}">
          <div class="lc-node-title">${n.label}</div>
          <div class="lc-node-code">${n.code}</div>
          <div class="lc-node-desc">${n.desc}</div>
        </div>
        ${idx < data.nodes.length - 1 ? `
        <div class="lc-arrow">
          <div class="lc-arrow-line"></div>
          <div class="lc-arrow-head"></div>
        </div>
        ` : ''}
      </div>
    `;
  });

  const contentHtml = `
    <div class="content-header">
      <div class="content-subtitle">${data.subtitle}</div>
      <h2 class="content-title">${data.icon} ${data.title}</h2>
      <p class="content-desc">${data.desc}</p>
    </div>
    
    <div class="lifecycle-diagram">
      <div class="lc-title">Flow Diagram: Request đi qua ${data.tabName}</div>
      <div class="lc-flow">
        ${nodesHtml}
      </div>
    </div>
    
    <div class="details-grid">
      <div class="detail-box">
        <h4>${data.box1.title}</h4>
        ${data.box1.content}
      </div>
      <div class="detail-box">
        <h4>${data.box2.title}</h4>
        ${data.box2.content}
      </div>
    </div>
  `;
  
  document.getElementById('contentArea').innerHTML = contentHtml;
}

// Init
renderSidebar();
// Load first item
selectFolder(foldersData[0].id, document.querySelector('.folder-tab'));
